  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ht: 700;\n  font-display: swap;\n  src: url(\"c231b8af-1c0d-4068-a261-126076878666\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n</style>\n\n<style>\n  :root {\n    --navy:       #0b1628;\n    --navy-mid:   #111f38;\n    --navy-light: #1a2f52;\n    --slate:      #2c3e5e;\n    --teal:       oklch(0.62 0.13 188);\n    --teal-dim:   oklch(0.55 0.11 188);\n    --teal-glow:  oklch(0.72 0.14 188);\n    --white:      #f7f8fb;\n    --off-white:  #eef0f5;\n    --body-text:  #1c2640;\n    --muted:      #5a6a8a;\n    --border:     #e0e5f0;\n    --card-bg:    #ffffff;\n    --section-bg: #f4f6fb;\n    --font-display: 'Playfair Display', Georgia, serif;\n    --font-body:    'DM Sans', system-ui, sans-serif;\n    --transition:   0.3s cubic-bezier(0.4,0,0.2,1);\n  }\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html { scroll-behavior: smooth; font-size: 16px; }\n\n  body {\n    font-family: var(--font-body);\n    color: var(--body-text);\n    background: var(--white);\n    line-height: 1.7;\n    overflow-x: hidden;\n  }\n\n  /* \u2500\u2500\u2500 SCROLLBAR \u2500\u2500\u2500 */\n  ::-webkit-scrollbar { width: 5px; }\n  ::-webkit-scrollbar-track { background: var(--navy); }\n  ::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 2px; }\n\n  /* \u2500\u2500\u2500 NAV \u2500\u2500\u2500 */\n  #nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    background: rgba(11, 22, 40, 0.96);\n    backdrop-filter: blur(12px);\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n    transition: var(--transition);\n  }\n  .nav-inner {\n    max-width: 1200px; margin: 0 auto;\n    padding: 0 2rem;\n    display: flex; align-items: center; justify-content: space-between;\n    height: 64px;\n  }\n  .nav-brand {\n    font-family: var(--font-display);\n    font-size: 1.15rem; font-weight: 600;\n    color: var(--white); letter-spacing: 0.02em;\n    text-decoration: none;\n  }\n  .nav-brand span { color: var(--teal-glow); }\n  .nav-links {\n    display: flex; gap: 2rem; list-style: none;\n  }\n  .nav-links a {\n    color: rgba(247,248,251,0.65);\n    text-decoration: none; font-size: 0.83rem;\n    font-weight: 500; letter-spacing: 0.06em;\n    text-transform: uppercase;\n    transition: color var(--transition);\n  }\n  .nav-links a:hover { color: var(--teal-glow); }\n  .nav-cta {\n    background: var(--teal); color: #fff;\n    border: none; border-radius: 6px;\n    padding: 0.45rem 1.1rem;\n    font-size: 0.8rem; font-weight: 600;\n    cursor: pointer; letter-spacing: 0.04em;\n    text-decoration: none;\n    transition: background var(--transition), transform var(--transition);\n  }\n  .nav-cta:hover { background: var(--teal-glow); transform: translateY(-1px); }\n\n  /* hamburger */\n  .nav-hamburger {\n    display: none; flex-direction: column; gap: 5px;\n    cursor: pointer; padding: 4px;\n    background: none; border: none;\n  }\n  .nav-hamburger span {\n    display: block; width: 22px; height: 2px;\n    background: var(--white); border-radius: 2px;\n    transition: var(--transition);\n  }\n  .mobile-menu {\n    display: none;\n    position: fixed; top: 64px; left: 0; right: 0;\n    background: rgba(11, 22, 40, 0.98);\n    padding: 1.5rem 2rem; z-index: 99;\n    border-bottom: 1px solid rgba(255,255,255,0.08);\n    flex-direction: column; gap: 1.2rem;\n  }\n  .mobile-menu.open { display: flex; }\n  .mobile-menu a {\n    color: rgba(247,248,251,0.75); text-decoration: none;\n    font-size: 1rem; font-weight: 500;\n    letter-spacing: 0.04em; text-transform: uppercase;\n  }\n\n  /* \u2500\u2500\u2500 HERO \u2500\u2500\u2500 */\n  #hero {\n    min-height: 100vh;\n    background: var(--navy);\n    display: flex; align-items: center;\n    position: relative; overflow: hidden;\n    padding: 100px 2rem 60px;\n  }\n  .hero-bg {\n    position: absolute; inset: 0; z-index: 0;\n    background:\n      radial-gradient(ellipse 70% 60% at 80% 50%, oklch(0.35 0.12 220 / 0.18) 0%, transparent 70%),\n      radial-gradient(ellipse 40% 50% at 10% 80%, oklch(0.30 0.10 188 / 0.15) 0%, transparent 70%);\n  }\n  .hero-grid {\n    position: absolute; inset: 0; z-index: 0;\n    background-image:\n      linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);\n    background-size: 60px 60px;\n    mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5) 20%, rgba(0,0,0,0.5) 80%, transparent);\n  }\n  .hero-inner {\n    max-width: 1200px; margin: 0 auto; width: 100%;\n    position: relative; z-index: 1;\n    display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;\n  }\n  .hero-eyebrow {\n    display: inline-flex; align-items: center; gap: 0.5rem;\n    color: var(--teal-glow); font-size: 0.78rem;\n    font-weight: 600; letter-spacing: 0.14em;\n    text-transform: uppercase; margin-bottom: 1.5rem;\n  }\n  .hero-eyebrow::before {\n    content: ''; display: block; width: 28px; height: 2px;\n    background: var(--teal-glow);\n  }\n  h1.hero-name {\n    font-family: var(--font-display);\n    font-size: clamp(3rem, 5vw, 4.5rem);\n    font-weight: 700; line-height: 1.08;\n    color: var(--white);\n    margin-bottom: 0.6rem;\n  }\n  h1.hero-name em {\n    font-style: italic; color: var(--teal-glow);\n  }\n  .hero-tagline {\n    font-size: 0.92rem; font-weight: 500;\n    color: rgba(247,248,251,0.55);\n    letter-spacing: 0.06em; text-transform: uppercase;\n    margin-bottom: 1.8rem;\n    line-height: 1.5;\n  }\n  .hero-value {\n    font-size: 1.12rem; color: rgba(247,248,251,0.82);\n    font-weight: 300; line-height: 1.75;\n    max-width: 500px;\n    margin-bottom: 2.4rem;\n    border-left: 2px solid var(--teal);\n    padding-left: 1.2rem;\n  }\n  .hero-actions {\n    display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;\n  }\n  .btn-primary {\n    background: var(--teal); color: #fff;\n    border: none; border-radius: 8px;\n    padding: 0.75rem 1.8rem;\n    font-size: 0.9rem; font-weight: 600;\n    cursor: pointer; text-decoration: none;\n    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);\n    box-shadow: 0 4px 20px oklch(0.62 0.13 188 / 0.35);\n  }\n  .btn-primary:hover {\n    background: var(--teal-glow);\n    transform: translateY(-2px);\n    box-shadow: 0 6px 28px oklch(0.62 0.13 188 / 0.5);\n  }\n  .btn-outline {\n    background: transparent; color: var(--white);\n    border: 1.5px solid rgba(247,248,251,0.25);\n    border-radius: 8px; padding: 0.75rem 1.8rem;\n    font-size: 0.9rem; font-weight: 500;\n    cursor: pointer; text-decoration: none;\n    transition: border-color var(--transition), background var(--transition), transform var(--transition);\n  }\n  .btn-outline:hover {\n    border-color: var(--teal-glow);\n    background: rgba(247,248,251,0.04);\n    transform: translateY(-2px);\n  }\n  .btn-icon {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 44px; height: 44px;\n    border: 1.5px solid rgba(247,248,251,0.22);\n    border-radius: 8px; text-decoration: none;\n    color: rgba(247,248,251,0.65);\n    transition: var(--transition);\n  }\n  .btn-icon:hover { border-color: var(--teal-glow); color: var(--teal-glow); transform: translateY(-2px); }\n  .btn-icon svg { width: 18px; height: 18px; }\n\n  /* hero right \u2014 stat panel */\n  .hero-stats {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;\n  }\n  .stat-card {\n    background: rgba(255,255,255,0.04);\n    border: 1px solid rgba(255,255,255,0.08);\n    border-radius: 12px; padding: 1.5rem;\n    transition: var(--transition);\n  }\n  .stat-card:hover {\n    background: rgba(255,255,255,0.07);\n    border-color: oklch(0.62 0.13 188 / 0.4);\n  }\n  .stat-num {\n    font-family: var(--font-display);\n    font-size: 2.2rem; font-weight: 700;\n    color: var(--teal-glow); line-height: 1;\n    margin-bottom: 0.35rem;\n  }\n  .stat-label {\n    font-size: 0.78rem; color: rgba(247,248,251,0.5);\n    font-weight: 500; letter-spacing: 0.04em;\n    line-height: 1.4;\n  }\n  .stat-card:last-child { grid-column: span 2; }\n\n  /* \u2500\u2500\u2500 SECTION WRAPPER \u2500\u2500\u2500 */\n  section { padding: 96px 2rem; }\n  .section-inner { max-width: 1200px; margin: 0 auto; }\n  .section-label {\n    display: inline-flex; align-items: center; gap: 0.5rem;\n    color: var(--teal); font-size: 0.75rem;\n    font-weight: 600; letter-spacing: 0.14em;\n    text-transform: uppercase; margin-bottom: 0.8rem;\n  }\n  .section-label::before {\n    content: ''; display: block; width: 20px; height: 2px; background: var(--teal);\n  }\n  h2.section-title {\n    font-family: var(--font-display);\n    font-size: clamp(2rem, 3.5vw, 2.8rem);\n    font-weight: 600; line-height: 1.2;\n    color: var(--navy); margin-bottom: 1rem;\n  }\n  .section-divider {\n    width: 48px; height: 3px; background: var(--teal);\n    border-radius: 2px; margin-bottom: 2.5rem;\n  }\n\n  /* \u2500\u2500\u2500 ABOUT \u2500\u2500\u2500 */\n  #about { background: var(--white); }\n  .about-grid {\n    display: grid; grid-template-columns: 1.1fr 0.9fr;\n    gap: 5rem; align-items: center;\n  }\n  .about-text p {\n    font-size: 1.05rem; color: #3a4a6a;\n    line-height: 1.85; margin-bottom: 1.2rem;\n  }\n  .about-text p:last-child { margin-bottom: 0; }\n  .competencies {\n    display: flex; flex-wrap: wrap; gap: 0.6rem;\n    margin-top: 2rem;\n  }\n  .chip {\n    background: oklch(0.62 0.13 188 / 0.1);\n    color: var(--teal-dim);\n    border: 1px solid oklch(0.62 0.13 188 / 0.25);\n    border-radius: 100px; padding: 0.35rem 1rem;\n    font-size: 0.8rem; font-weight: 600;\n    letter-spacing: 0.02em;\n    transition: var(--transition);\n  }\n  .chip:hover {\n    background: oklch(0.62 0.13 188 / 0.18);\n er { display: flex; }\n  }\n  @media (max-width: 600px) {\n    section { padding: 64px 1.25rem; }\n    .case-header { grid-template-columns: auto 1fr; }\n    .case-toggle { display: none; }\n    .case-body-grid { grid-template-columns: 1fr; }\n    .outcomes-row { flex-direction: column; }\n    h2.section-title { font-size: 1.8rem; }\n    .hero-actions { flex-direction: column; align-items: flex-start; }\n  }\n</style>\n</head>\n<body>\n\n<!-- NAV -->\n<nav id=\"nav\">\n  <div class=\"nav-inner\">\n    <a href=\"#hero\" class=\"nav-brand\">Avinash <span>Pullela</span></a>\n    <ul class=\"nav-links\">\n      <li><a href=\"#about\">About</a></li>\n      <li><a href=\"#work\">Work</a></li>\n      <li><a href=\"#ventures\">Ventures</a></li>\n      <li><a href=\"#projects\">Projects</a></li>\n      <li><a href=\"#skills\">Skills</a></li>\n      <li><a href=\"#timeline\">Timeline</a></li>\n      <li><a href=\"#contact\">Contact</a></li>\n    </ul>\n    <a href=\"mailto:avinash.pullela@gmail.com\" class=\"nav-cta\">Get in Touch</a>\n    <button class=\"nav-hamburger\" id=\"hamburger\" aria-label=\"Menu\">\n      <span></span><span></span><span></span>\n    </button>\n  </div>\n</nav>\n<div class=\"mobile-menu\" id=\"mobile-menu\">\n  <a href=\"#about\" onclick=\"closeMobileMenu()\">About</a>\n  <a href=\"#work\" onclick=\"closeMobileMenu()\">Work</a>\n  <a href=\"#projects\" onclick=\"closeMobileMenu()\">Projects</a>\n  <a href=\"#skills\" onclick=\"closeMobileMenu()\">Skills</a>\n  <a href=\"#timeline\" onclick=\"closeMobileMenu()\">Timeline</a>\n  <a href=\"#contact\" onclick=\"closeMobileMenu()\">Contact</a>\n</div>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-bg\"></div>\n  <div class=\"hero-grid\"></div>\n  <div class=\"hero-inner\">\n    <div class=\"hero-left\">\n      <div class=\"hero-eyebrow\">Senior Product Manager</div>\n      <h1 class=\"hero-name\">Avinash<br><em>Pullela</em></h1>\n      <p class=\"hero-tagline\">Liquidity &amp; Data Products \u00b7 Fintech &amp; Capital Markets</p>\n      <p class=\"hero-value\">\n        I turn complex regulatory and data challenges into shipped product \u2014 bridging business strategy, data architecture, and engineering to deliver outcomes at scale.\n      </p>\n      <div class=\"hero-actions\">\n        <a href=\"#work\" class=\"btn-primary\">View My Work</a>\n        <a href=\"#\" class=\"btn-outline\">Download Resume</a>\n        <a href=\"https://www.linkedin.com/in/avinashpullela\" target=\"_blank\" class=\"btn-icon\" aria-label=\"LinkedIn\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\">\n            <path d=\"M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z\"></path>\n          </svg>\n        </a>\n      </div>\n    </div>\n    <div class=\"hero-stats fade-up fade-up-delay-2\">\n      <div class=\"stat-card\">\n        <div class=\"stat-num\">12+</div>\n        <div class=\"stat-label\">Years of product &amp; delivery experience</div>\n      </div>\n      <div class=\"stat-card\">\n        <div class=\"stat-num\">30%</div>\n        <div class=\"stat-label\">Avg. efficiency gain across shipped products</div>\n      </div>\n      <div class=\"stat-card\">\n        <div class=\"stat-num\">3</div>\n        <div class=\"stat-label\">Industries: Capital Markets \u00b7 Retail \u00b7 Supply Chain</div>\n      </div>\n      <div class=\"stat-card\">\n        <div class=\"stat-num\">5+</div>\n        <div class=\"stat-label\">Business lines managed simultaneously at Citi</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ABOUT -->\n<section id=\"about\">\n  <div class=\"section-inner\">\n    <div class=\"about-grid\">\n      <div class=\"about-left fade-up\">\n        <div class=\"section-label\">About Me</div>\n        <h2 class=\"section-title\">Strategy, data, and delivery \u2014 at scale.</h2>\n        <div class=\"section-divider\"></div>\n        <div class=\"about-text\">\n          <p>Results-driven Product Manager with 12+ years across capital markets, supply chain, and retail technology. Currently at Citi, leading product strategy for liquidity management and data products across multiple regulatory frameworks.</p>\n          <p>Deep expertise in regulatory compliance, data governance, and translating ambiguous requirements into executable roadmaps. Known for bridging the gap between technical architecture and business stakeholders \u2014 from engineering teams to C-suite.</p>\n          <p>Based in Greater Toronto Area; actively exploring PM roles in fintech, enterprise data, and capital markets where product depth meets strategic impact.</p>\n        </div>\n        <div class=\"competencies\">\n          <span class=\"chip\">Product Strategy &amp; Roadmapping</span>\n          <span class=\"chip\">Stakeholder Management</span>\n          <span class=\"chip\">Agile Delivery</span>\n          <span class=\"chip\">Data &amp; Regulatory Products</span>\n        </div>\n      </div>\n      <div class=\"about-right fade-up fade-up-delay-2\">\n        <div class=\"about-badge\">\n          <div class=\"about-badge-label\">Current Role</div>\n          <div class=\"about-badge-value\">Senior PM, Liquidity Management Services</div>\n        </div>\n        <div class=\"about-badge\">\n          <div class=\"about-badge-label\">Company</div>\n          <div class=\"about-badge-value\">Citi \u2014 Global Banking</div>\n        </div>\n        <div class=\"about-badge\">\n          <div class=\"about-badge-label\">Domain Focus</div>\n          <div class=\"about-badge-value\">Liquidity Risk \u00b7 Fund Transfer Pricing \u00b7 Data Lineage</div>\n        </div>\n        <div class=\"about-badge\">\n          <div class=\"about-badge-label\">Education</div>\n          <div class=\"about-badge-value\">MBA, Finance &amp; IT \u2014 Xavier Institute of Management</div>\n        </div>\n        <div class=\"location-chip\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\n            <path d=\"M12 21s-7-6.686-7-11A7 7 0 0119 10c0 4.314-7 11-7 11z\"></path><circle cx=\"12\" cy=\"10\" r=\"2.5\"></circle>\n          </svg>\n          Greater Toronto Area, Ontario\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- CASE STUDIES -->\n<section id=\"work\">\n  <div class=\"section-inner\">\n    <div class=\"fade-up\">\n      <div class=\"section-label\">Featured Work</div>\n      <h2 class=\"section-title\">Case Studies</h2>\n      <div class=\"section-divider\"></div>\n    </div>\n    <div class=\"case-studies\">\n\n      <!-- Card 1 -->\n      <div class=\"case-card fade-up\" onclick=\"toggleCase(this)\">\n        <div class=\"case-header\">\n          <div class=\"case-number\">01</div>\n          <div class=\"case-meta\">\n            <div class=\"case-company\">Citi \u00b7 2024\u2013Present</div>\n            <div class=\"case-title\">Stress Modeling &amp; Regulatory Compliance Product</div>\n            <div class=\"case-subtitle\">Senior Product Manager \u00b7 Liquidity Risk Reporting</div>\n          </div>\n          <div class=\"case-toggle\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\n              <polyline points=\"6 9 12 15 18 9\"></polyline>\n            </svg>\n          </div>\n        </div>\n        <div class=\"case-body\">\n          <div class=\"case-body-grid\">\n            <div class=\"case-block\">\n              <h4>The Problem</h4>\n              <p>Liquidity risk reporting lacked traceability and regulatory robustness across 5 business lines, creating exposure to compliance gaps and audit risk in a heavily scrutinized environment.</p>\n            </div>\n            <div class=\"case-block\">\n              <h4>What I Did</h4>\n              <p>Owned product vision and backlog; translated complex stress testing requirements into 10+ technical epics; partnered with legal, risk, and finance teams; implemented data lineage tooling to establish end-to-end traceability.</p>\n            </div>\n            <div class=\"case-block\">\n              <h4>My Role</h4>\n              <p>Led cross-functional collaboration across engineering, architecture, legal, risk and finance. Served as the product authority for all regulatory deliverables and data governance frameworks.</p>\n            </div>\n          </div>\n          <div class=\"outcomes-row\">\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">15%</div><div class=\"outcome-label\">Reduction in liquidity risk</div></div>\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">30%</div><div class=\"outcome-label\">Improvement in data traceability</div></div>\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">5</div><div class=\"outcome-label\">Business lines covered</div></div>\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">10+</div><div class=\"outcome-label\">Technical epics delivered</div></div>\n          </div>\n          <div class=\"skill-tags\">\n            <span class=\"skill-tag\">Product Vision</span>\n            <span class=\"skill-tag\">Backlog Prioritization</span>\n            <span class=\"skill-tag\">Data Lineage</span>\n            <span class=\"skill-tag\">Regulatory Compliance</span>\n            <span class=\"skill-tag\">Cross-functional Leadership</span>\n          </div>\n        </div>\n      </div>\n\n      <!-- Card 2 -->\n      <div class=\"case-card fade-up fade-up-delay-1\" onclick=\"toggleCase(this)\">\n        <div class=\"case-header\">\n          <div class=\"case-number\">02</div>\n          <div class=\"case-meta\">\n            <div class=\"case-company\">Citi Canada \u00b7 2022\u20132024</div>\n            <div class=\"case-title\">Olympus Data Fabric Platform</div>\n            <div class=\"case-subtitle\">Senior PM \u2013 Data Strategy \u00b7 Enterprise Data Infrastructure</div>\n          </div>\n          <div class=\"case-toggle\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\n              <polyline points=\"6 9 12 15 18 9\"></polyline>\n            </svg>\n          </div>\n        </div>\n        <div class=\"case-body\">\n          <div class=\"case-body-grid\">\n            <div class=\"case-block\">\n              <h4>The Problem</h4>\n              <p>Fragmented data infrastructure across multicultural, multi-timezone teams was slowing delivery and creating inconsistent data quality across equity and syndicate deal flows.</p>\n            </div>\n            <div class=\"case-block\">\n              <h4>What I Did</h4>\n              <p>Led feature development for enterprise data fabric platform; established agile ceremonies (Scrum/Kanban); maintained Jira dashboards for real-time stakeholder visibility; managed Syndicate Deals and Equity middle office transaction flows.</p>\n            </div>\n            <div class=\"case-block\">\n              <h4>My Role</h4>\n              <p>Drove platform product management from inception to delivery. Coordinated across distributed teams across geographies and time zones, establishing operating rhythm and clear OKRs.</p>\n            </div>\n          </div>\n          <div class=\"outcomes-row\">\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">25%</div><div class=\"outcome-label\">Efficiency improvement</div></div>\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">\u2191</div><div class=\"outcome-label\">SLA adherence improved</div></div>\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">\u2191</div><div class=\"outcome-label\">Client delivery alignment</div></div>\n          </div>\n          <div class=\"skill-tags\">\n            <span class=\"skill-tag\">Platform Product Management</span>\n            <span class=\"skill-tag\">Agile (Scrum/Kanban)</span>\n            <span class=\"skill-tag\">Stakeholder Reporting</span>\n            <span class=\"skill-tag\">Data Infrastructure</span>\n          </div>\n        </div>\n      </div>\n\n      <!-- Card 3 -->\n      <div class=\"case-card fade-up fade-up-delay-2\" onclick=\"toggleCase(this)\">\n        <div class=\"case-header\">\n          <div class=\"case-number\">03</div>\n          <div class=\"case-meta\">\n            <div class=\"case-company\">Tata Steel Limited \u00b7 2015\u20132021</div>\n            <div class=\"case-title\">Supply Chain &amp; Retail Operations Transformation</div>\n            <div class=\"case-subtitle\">Project Manager \u00b7 Supply Chain &amp; Retail Technology</div>\n          </div>\n          <div class=\"case-toggle\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\n              <polyline points=\"6 9 12 15 18 9\"></polyline>\n            </svg>\n          </div>\n        </div>\n        <div class=\"case-body\">\n          <div class=\"case-body-grid\">\n            <div class=\"case-block\">\n              <h4>The Problem</h4>\n              <p>Supply chain and retail operations lacked end-to-end visibility across procurement, inventory, and distribution \u2014 leading to inefficiencies, delays, and limited data-driven decision-making across business units.</p>\n            </div>\n            <div class=\"case-block\">\n              <h4>What I Did</h4>\n              <p>Led cross-functional project teams to streamline supply chain workflows; drove process re-engineering initiatives; implemented data-driven reporting frameworks and coordinated delivery across procurement, logistics, and IT stakeholders.</p>\n            </div>\n            <div class=\"case-block\">\n              <h4>My Role</h4>\n              <p>End-to-end project management accountability over a 6-year tenure. Served as the bridge between business operations and technology teams, building the foundation for a data-informed supply chain.</p>\n            </div>\n          </div>\n          <div class=\"outcomes-row\">\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">6</div><div class=\"outcome-label\">Years of delivery leadership</div></div>\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">\u2191</div><div class=\"outcome-label\">Supply chain visibility improved</div></div>\n            <div class=\"outcome-stat\"><div class=\"outcome-num\">\u2193</div><div class=\"outcome-label\">Operational delays reduced</div></div>\n          </div>\n          <div class=\"skill-tags\">\n            <span class=\"skill-tag\">Project Management</span>\n            <span class=\"skill-tag\">Supply Chain</span>\n            <span class=\"skill-tag\">Process Re-engineering</span>\n            <span class=\"skill-tag\">Cross-functional Leadership</span>\n            <span class=\"skill-tag\">Retail Operations</span>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- SIDE PROJECTS -->\n<section id=\"ventures\">\n  <div class=\"section-inner\">\n    <div class=\"fade-up\">\n      <div class=\"section-label\">Beyond the Day Job</div>\n      <h2 class=\"section-title\">Side Ventures</h2>\n      <div class=\"section-divider\"></div>\n    </div>\n    <div class=\"venture-card fade-up\">\n      <div class=\"venture-header\">\n        <div class=\"venture-logo\">CI</div>\n        <div class=\"venture-meta\">\n          <div class=\"venture-company\">Citac Inc.</div>\n          <div class=\"venture-role\">Market Development Consultant \u00b7 North America</div>\n        </div>\n        <div class=\"venture-badge\">Active</div>\n      </div>\n      <p class=\"venture-desc\">\n        Promoting Indian precision casting suppliers \u2014 including Tata Auto Components and Pooja Auto \u2014 in the North American market. Working as a connector between manufacturing capability and buyer demand: identifying qualified buyers, building relationships, and closing supply partnerships.\n      </p>\n      <div class=\"venture-stats\">\n        <div class=\"venture-stat\">\n          <div class=\"venture-num\">3</div>\n          <div class=\"venture-label\">New clients identified &amp; connected in 7 months</div>\n        </div>\n        <div class=\"venture-stat\">\n          <div class=\"venture-num\">$125K</div>\n          <div class=\"venture-label\">Total order value generated (USD)</div>\n        </div>\n        <div class=\"venture-stat\">\n          <div class=\"venture-num\">7 mo</div>\n          <div class=\"venture-label\">Time to first results</div>\n        </div>\n      </div>\n      <div class=\"skill-tags\" style=\"margin-top:1.5rem\">\n        <span class=\"skill-tag\">B2B Market Development</span>\n        <span class=\"skill-tag\">Supply Chain</span>\n        <span class=\"skill-tag\">Business Development</span>\n        <span class=\"skill-tag\">North American Markets</span>\n        <span class=\"skill-tag\">Manufacturing &amp; Auto Components</span>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- PROJECTS -->\n<section id=\"projects\">\n  <div class=\"section-inner\">\n    <div class=\"fade-up\">\n      <div class=\"section-label\">In the Lab</div>\n      <h2 class=\"section-title\">Active Side Projects</h2>\n      <div class=\"section-divider\"></div>\n    </div>\n    <p class=\"venture-desc fade-up\" style=\"margin-top:1.5rem;max-width:680px;\">\n      Things I am building in my own time \u2014 exploring ideas at the intersection of data, personalisation, and everyday experiences.\n    </p>\n    <div class=\"projects-grid\" id=\"projects-grid\"></div>\n  </div>\n</section>\n\n<!-- SKILLS -->\n<section id=\"skills\">\n  <div class=\"section-inner\">\n    <div class=\"fade-up\">\n      <div class=\"section-label\">Expertise</div>\n      <h2 class=\"section-title\">Skills &amp; Domain Knowledge</h2>\n      <div class=\"section-divider\"></div>\n    </div>\n    <div class=\"skills-grid\">\n      <div class=\"skill-category fade-up\">\n        <div class=\"skill-cat-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n            <rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"></rect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"></rect>\n            <rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"></rect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"></rect>\n          </svg>\n        </div>\n        <div class=\"skill-cat-name\">Product Management</div>\n        <ul class=\"skill-list\">\n          <li>Roadmapping &amp; Prioritization</li>\n          <li>Backlog Management</li>\n          <li>Feature Definition</li>\n          <li>MVP Planning</li>\n          <li>Product Lifecycle</li>\n        </ul>\n      </div>\n      <div class=\"skill-category fade-up fade-up-delay-1\">\n        <div class=\"skill-cat-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n            <circle cx=\"12\" cy=\"12\" r=\"3\"></circle><path d=\"M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83\"></path>\n          </svg>\n        </div>\n        <div class=\"skill-cat-name\">Methodologies</div>\n        <ul class=\"skill-list\">\n          <li>Agile \u2014 Scrum &amp; Kanban</li>\n          <li>Waterfall</li>\n          <li>Hybrid Delivery</li>\n          <li>OKRs &amp; KPIs</li>\n        </ul>\n      </div>\n      <div class=\"skill-category fade-up fade-up-delay-2\">\n        <div class=\"skill-cat-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n            <path d=\"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\"></path>\n          </svg>\n        </div>\n        <div class=\"skill-cat-name\">Domain Expertise</div>\n        <ul class=\"skill-list\">\n          <li>Liquidity Management</li>\n          <li>Fund Transfer Pricing</li>\n          <li>Stress Modeling</li>\n          <li>Data Lineage</li>\n          <li>Regulatory Compliance</li>\n        </ul>\n      </div>\n      <div class=\"skill-category fade-up fade-up-delay-3\">\n        <div class=\"skill-cat-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n            <path d=\"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2\"></path><circle cx=\"9\" cy=\"7\" r=\"4\"></circle>\n            <path d=\"M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75\"></path>\n          </svg>\n        </div>\n        <div class=\"skill-cat-name\">Stakeholder Management</div>\n        <ul class=\"skill-list\">\n          <li>Business Users &amp; Engineering</li>\n          <li>Architecture &amp; Data Governance</li>\n          <li>Legal &amp; Risk</li>\n          <li>C-Suite Reporting</li>\n        </ul>\n      </div>\n      <div class=\"skill-category fade-up fade-up-delay-4\">\n        <div class=\"skill-cat-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n            <rect x=\"2\" y=\"3\" width=\"20\" height=\"14\" rx=\"2\"></rect><path d=\"M8 21h8M12 17v4\"></path>\n          </svg>\n        </div>\n        <div class=\"skill-cat-name\">Tools &amp; Platforms</div>\n        <ul class=\"skill-list\">\n          <li>Jira &amp; Confluence</li>\n          <li>Data Profiling Tools</li>\n          <li>Data Quality Frameworks</li>\n          <li>SQL &amp; Analytics</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- TIMELINE -->\n<section id=\"timeline\">\n  <div class=\"section-inner\">\n    <div class=\"fade-up\">\n      <div class=\"section-label\">Career</div>\n      <h2 class=\"section-title\">Professional Timeline</h2>\n      <div class=\"section-divider\"></div>\n    </div>\n    <div class=\"timeline-track fade-up\">\n      <div class=\"timeline-item active-role\">\n        <div class=\"timeline-dot\"></div>\n        <div class=\"timeline-period\">Nov 2024 \u2013 Present</div>\n        <div class=\"timeline-role\">Senior PM, Liquidity Management Services <span class=\"timeline-present\">Current</span></div>\n        <div class=\"timeline-company\">Citi</div>\n      </div>\n      <div class=\"timeline-item\">\n        <div class=\"timeline-dot\"></div>\n        <div class=\"timeline-period\">May 2022 \u2013 Nov 2024</div>\n        <div class=\"timeline-role\">Senior PM, Data Strategy</div>\n        <div class=\"timeline-company\">Citi Canada</div>\n      </div>\n      <div class=\"timeline-item\">\n        <div class=\"timeline-dot\"></div>\n        <div class=\"timeline-period\">Mar 2021 \u2013 May 2022</div>\n        <div class=\"timeline-role\">PM, Customer Success / BOPIS</div>\n        <div class=\"timeline-company\">Infosys Canada (Client: GAP)</div>\n      </div>\n      <div class=\"timeline-item\">\n        <div class=\"timeline-dot\"></div>\n        <div class=\"timeline-period\">Apr 2015 \u2013 Feb 2021</div>\n        <div class=\"timeline-role\">Project Manager, Supply Chain &amp; Retail</div>\n        <div class=\"timeline-company\">Tata Steel Limited</div>\n      </div>\n      <div class=\"timeline-item\">\n        <div class=\"timeline-dot\"></div>\n        <div class=\"timeline-period\">Aug 2012 \u2013 Jun 2013</div>\n        <div class=\"timeline-role\">Software Developer</div>\n        <div class=\"timeline-company\">Societe Generale</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- EDUCATION -->\n<section id=\"education\">\n  <div class=\"section-inner\">\n    <div class=\"fade-up\">\n      <div class=\"section-label\">Education</div>\n      <h2 class=\"section-title\">Academic Background</h2>\n      <div class=\"section-divider\"></div>\n    </div>\n    <div class=\"edu-grid fade-up\">\n      <div class=\"edu-card\">\n        <div class=\"edu-degree\">MBA \u2014 Finance &amp; Information Technology</div>\n        <div class=\"edu-school\">Xavier Institute of Management</div>\n        <div class=\"edu-years\">2013 \u2013 2015</div>\n      </div>\n      <div class=\"edu-card\">\n        <div class=\"edu-degree\">B.Tech \u2014 Engineering</div>\n        <div class=\"edu-school\">Manipal Institute of Technology</div>\n        <div class=\"edu-years\">2008 \u2013 2012</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- CONTACT -->\n<section id=\"contact\">\n  <div class=\"section-inner\">\n    <div class=\"fade-up\">\n      <div class=\"section-label\">Contact</div>\n      <h2 class=\"section-title\">Let's Connect</h2>\n      <div class=\"section-divider\"></div>\n    </div>\n    <p class=\"contact-sub fade-up\">\n      Open to senior PM opportunities in fintech, enterprise data, and capital markets. Let's have a conversation about how I can help your team ship better products.\n    </p>\n    <div class=\"contact-grid fade-up\">\n      <a href=\"mailto:avinash.pullela@gmail.com\" class=\"contact-item\">\n        <div class=\"contact-item-label\">Email</div>\n        <div class=\"contact-item-value\">avinash.pullela@gmail.com</div>\n      </a>\n      <a href=\"tel:+16476141302\" class=\"contact-item\">\n        <div class=\"contact-item-label\">Phone</div>\n        <div class=\"contact-item-value\">+1 647-614-1302</div>\n      </a>\n      <a href=\"https://www.linkedin.com/in/avinashpullela\" target=\"_blank\" class=\"contact-item\">\n        <div class=\"contact-item-label\">LinkedIn</div>\n        <div class=\"contact-item-value\">linkedin.com/in/avinashpullela</div>\n      </a>\n      <div class=\"contact-item\" style=\"cursor:default\">\n        <div class=\"contact-item-label\">Location</div>\n        <div class=\"contact-item-value\">Greater Toronto Area, Ontario</div>\n      </div>\n    </div>\n    <div class=\"footer-bottom fade-up\">\n      <div class=\"footer-copy\">\u00a9 2025 <span>Avinash Pullela</span>. Senior Product Manager.</div>\n      <div class=\"footer-copy\">Greater Toronto Area \u00b7 Open to new opportunities</div>\n    </div>\n  </div>\n</section>\n\n<!-- TWEAKS -->\n<div id=\"tweaks-panel\">\n  <h3>Tweaks</h3>\n  <div class=\"tweak-row\">\n    <label>Accent Color</label>\n    <select id=\"tweak-accent\" onchange=\"applyTweaks()\">\n      <option value=\"188\">Teal (default)</option>\n      <option value=\"220\">Blue</option>\n      <option value=\"270\">Indigo</option>\n      <option value=\"160\">Emerald</option>\n    </select>\n  </div>\n  <div class=\"tweak-row\">\n    <label>Type Scale</label>\n    <select id=\"tweak-type\" onchange=\"applyTweaks()\">\n      <option value=\"default\">Playfair + DM Sans (default)</option>\n      <option value=\"modern\">DM Serif + DM Sans</option>\n    </select>\n  </div>\n  <div class=\"tweak-row\">\n    <label>Section Density</label>\n    <input type=\"range\" id=\"tweak-density\" min=\"56\" max=\"120\" value=\"96\" step=\"8\" oninput=\"applyTweaks()\">\n  </div>\n</div>\n\n<script>\n  /* \u2500\u2500\u2500 MOBILE NAV \u2500\u2500\u2500 */\n  const hamburger = document.getElementById('hamburger');\n  const mobileMenu = document.getElementById('mobile-menu');\n  hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));\n  function closeMobileMenu() { mobileMenu.classList.remove('open'); }\n\n  /* \u2500\u2500\u2500 SCROLL FADE \u2500\u2500\u2500 */\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });\n  }, { threshold: 0.12 });\n  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));\n\n  /* \u2500\u2500\u2500 CASE CARD TOGGLE \u2500\u2500\u2500 */\n  function toggleCase(card) {\n    const isOpen = card.classList.contains('expanded');\n    document.querySelectorAll('.case-card').forEach(c => c.classList.remove('expanded'));\n    if (!isOpen) card.classList.add('expanded');\n  }\n\n  /* \u2500\u2500\u2500 TWEAKS \u2500\u2500\u2500 */\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';\n    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n  });\n  window.parent.postMessage({type: '__edit_mode_available'}, '*');\n\n  function applyTweaks() {\n    const hue = document.getElementById('tweak-accent').value;\n    const density = document.getElementById('tweak-density').value;\n    document.documentElement.style.setProperty('--teal', `oklch(0.62 0.13 ${hue})`);\n    document.documentElement.style.setProperty('--teal-dim', `oklch(0.55 0.11 ${hue})`);\n    document.documentElement.style.setProperty('--teal-glow', `oklch(0.72 0.14 ${hue})`);\n    document.querySelectorAll('section').forEach(s => {\n      s.style.paddingTop = density + 'px';\n      s.style.paddingBottom = density + 'px';\n    });\n    const edits = { accentHue: Number(hue), density: Number(density) };\n    window.parent.postMessage({type: '__edit_mode_set_keys', edits}, '*');\n  }\n\n  /* \u2500\u2500\u2500 NAV ACTIVE \u2500\u2500\u2500 */\n  const sections = document.querySelectorAll('section[id]');\n  window.addEventListener('scroll', () => {\n    const y = window.scrollY + 80;\n    sections.forEach(s => {\n      const link = document.querySelector(`.nav-links a[href=\"#${s.id}\"]`);\n      if (!link) return;\n      if (s.offsetTop <= y && s.offsetTop + s.offsetHeight > y) {\n        link.style.color = 'var(--teal-glow)';\n      } else {\n        link.style.color = '';\n      }\n    });\n  });\n\n  /* \u2500\u2500\u2500 SIDE PROJECTS DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n     To add a new project, append an object to this array.\n     status values: \"active\" | \"building\" | \"idea\"\n  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  const PROJECTS = [\n    {\n      icon: \"\ud83c\udf7d\ufe0f\",\n      name: \"Food & Beverage Taste Profiler\",\n      status: \"building\",\n      statusLabel: \"Building\",\n      description: \"A personalised taste-profiling app that learns your flavour preferences across cuisines, ingredients, and dining experiences \u2014 then surfaces restaurant and recipe recommendations tailored to your palate.\",\n      tags: [\"Consumer App\", \"Personalisation\", \"Food Tech\", \"AI/ML\"]\n    },\n    {\n      icon: \"\ud83d\udc57\",\n      name: \"Personal Style Suggestion Engine\",\n      status: \"building\",\n      statusLabel: \"Building\",\n      description: \"An AI-powered styling assistant that analyses your wardrobe, aesthetic preferences, and occasions to suggest outfits and surface new pieces that genuinely fit the way you dress.\",\n      tags: [\"AI/ML\", \"Personalisation\", \"Fashion Tech\", \"Consumer App\"]\n    }\n  ];\n\n  (function renderProjects() {\n    const grid = document.getElementById('projects-grid');\n    if (!grid) return;\n    grid.innerHTML = PROJECTS.map(p => `\n      <div class=\"project-card fade-up\">\n        <div class=\"project-card-top\">\n          <div class=\"project-icon\">${p.icon}</div>\n          <span class=\"project-status ${p.status}\">${p.statusLabel}</span>\n        </div>\n        <div class=\"project-name\">${p.name}</div>\n        <p class=\"project-desc\">${p.description}</p>\n        <div class=\"skill-tags\">\n          ${p.tags.map(t => `<span class=\"skill-tag\">${t}</span>`).join('')}\n        </div>\n      </div>\n    `).join('');\n    grid.querySelectorAll('.fade-up').forEach(el => observer.observe(el));\n  })();\n\n</script>\n\n\n</body></html>"</script>
